<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — Alma Digital</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="news-page">

  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-logo">ALMA<span>DIGITAL</span></a>
    <div class="nav-links">
      <a href="{{ url_for('news_page') }}" class="active">News</a>
      <a href="{{ url_for('cabinet') }}" class="btn-nav">Cabinet</a>
    </div>
  </nav>

  <div class="news-hero">
    <div class="hero-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
    </div>
    <div class="news-hero-content">
      <div class="hero-badge">Latest Updates</div>
      <h1>Alma Digital News</h1>
      <p>Stay up to date with the latest product updates and announcements.</p>
    </div>
  </div>

  <div class="news-container container">
    <div id="newsList" class="news-list">
      <div class="loading-state">Loading news...</div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <span class="nav-logo">ALMA<span>DIGITAL</span></span>
      <p>© 2024 Alma Digital. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", loadNews);

    async function loadNews() {
      const list = document.getElementById("newsList");
      try {
        const res = await fetch("/api/news");
        const items = await res.json();
        if (!items.length) {
          list.innerHTML = '<p class="empty-msg">No news available.</p>';
          return;
        }
        list.innerHTML = items.map(item => `
          <article class="news-card">
            <div class="news-meta">${formatDate(item.created_at)}</div>
            <h2 class="news-title">${escHtml(item.title)}</h2>
            <p class="news-text">${escHtml(item.text)}</p>
          </article>
        `).join("");
      } catch {
        list.innerHTML = '<p class="empty-msg">Failed to load news.</p>';
      }
    }

    function formatDate(str) {
      const d = new Date(str);
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
